    <path d="M196 113c16-9 26-24 29-44-18 3-33 12-42 28-6 10-6 22-3 34 6-1 11-5 16-18Z" fill="url(#leaf)"/>
    <path d="M191 126c5-20 15-35 31-51" fill="none" stroke="#f8fff9" stroke-width="5" stroke-linecap="round"/>
