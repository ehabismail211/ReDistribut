<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ReDist logo option 01 - leaf D</title>
  <desc id="desc">A refined ReDist wordmark with a leaf inside the D and a dignity-focused tagline.</desc>
  <defs>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b7d96a"/>
      <stop offset="0.62" stop-color="#178a5f"/>
      <stop offset="1" stop-color="#0f4a3f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="34" fill="#fbfdfb"/>
  <g transform="translate(64 58)">
