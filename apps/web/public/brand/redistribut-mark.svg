<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ReDist clear RD mark</title>
  <desc id="desc">A compact ReDist RD monogram with a leaf accent, representing responsible redistribution and recovery.</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="48" x2="456" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbfdfb"/>
      <stop offset="1" stop-color="#eff8ef"/>
    </linearGradient>
    <linearGradient id="leaf" x1="184" y1="130" x2="348" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b7d96a"/>
      <stop offset="0.58" stop-color="#178a5f"/>
      <stop offset="1" stop-color="#0f4a3f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12362f" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect x="34" y="34" width="444" height="444" rx="112" fill="url(#bg)" stroke="#d8eadc" stroke-width="10"/>
  <g filter="url(#shadow)" font-family="Avenir Next Condensed, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="252" font-weight="800" letter-spacing="-14">
    <text x="84" y="337" fill="#10231f">RD</text>
    <path d="M252 318c50-29 78-71 85-124-50 7-91 34-114 75-15 27-17 57-9 81 13-3 26-9 38-32Z" fill="url(#leaf)"/>
    <path d="M241 342c14-54 42-96 90-139" fill="none" stroke="#f8fff9" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
